<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>親子館註冊系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        .container { max-width: 400px; margin: auto; border: 1px solid #ccc; padding: 20px; border-radius: 10px; }
        input { width: 90%; padding: 10px; margin: 10px 0; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; cursor: pointer; }
        #qrcode { margin-top: 20px; display: flex; justify-content: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2>親子館初次註冊</h2>
        <form id="regForm">
            <input type="text" id="parent_name" placeholder="家長姓名" required>
            <input type="text" id="phone" placeholder="聯絡電話" required>
            <button type="submit">送出並產生進館碼</button>
        </form>

        <div id="qrcode"></div>
        <p id="msg"></p>
    </div>

    <script>
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('parent_name').value;
            const phone = document.getElementById('phone').value;

            // 呼叫後端 PHP 儲存資料
            const response = await fetch('save_member.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `name=${name}&phone=${phone}`
            });
            const resData = await response.json();

            if(resData.status === 'success') {
                document.getElementById('msg').innerText = "註冊成功！請截圖保存 QR Code 進館。";
                document.getElementById('qrcode').innerHTML = ""; // 清空舊內容
                // 產生包含會員 ID 的 QR Code
                new QRCode(document.getElementById("qrcode"), resData.member_id.toString());
            } else {
                alert("錯誤：" + resData.message);
            }
        };
    </script>
</body>
</html>
