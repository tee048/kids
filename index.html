<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>親子館快速報到入口</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background-color: #f9f9f9; }
        .container { max-width: 400px; margin: auto; border: 1px solid #ddd; padding: 30px; border-radius: 15px; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        button { width: 96%; padding: 12px; background: #e2ad39; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button.register { background: #2883a7; }
        .hidden { display: none; }
        #status_msg { margin-top: 20px; font-weight: bold; color: #d9534f; }
    </style>
</head>
<body>
    <div class="container">
        <h2 id="title">親子館入館登記</h2>
        <p id="instruction">請輸入手機號碼開始報到</p>
        
        <form id="checkinForm">
            <!-- 第一步：永遠先填電話 -->
            <input type="tel" id="phone" placeholder="輸入聯絡電話" required>
            
            <!-- 第二步：如果是新朋友，這個欄位會被 JS 顯示出來 -->
            <div id="new_member_fields" class="hidden">
                <p style="color: #666; font-size: 0.9em;">偵測到您是第一次來，請填寫姓名：</p>
                <input type="text" id="parent_name" placeholder="家長姓名">
            </div>
            
            <button type="submit" id="submit_btn">確認報到</button>
        </form>

        <p id="status_msg"></p>
    </div>

    <script>
        const form = document.getElementById('checkinForm');
        const phoneInput = document.getElementById('phone');
        const newMemberFields = document.getElementById('new_member_fields');
        const nameInput = document.getElementById('parent_name');
        const submitBtn = document.getElementById('submit_btn');

        form.onsubmit = async (e) => {
            e.preventDefault();
            
            const phone = phoneInput.value;
            const name = nameInput.value;

            // 呼叫後端 (我們將原本的 save_member.php 改造成 checkin_logic.php)
            const response = await fetch('checkin_logic.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `phone=${phone}&name=${name}`
            });
            
            const resData = await response.json();

            if (resData.status === 'need_register') {
                // 如果後端回傳需要註冊
                newMemberFields.classList.remove('hidden');
                nameInput.setAttribute('required', 'true');
                submitBtn.innerText = "完成註冊並報到";
                submitBtn.classList.add('register');
                document.getElementById('status_msg').innerText = "歡迎新朋友！請填寫姓名。";
            } else if (resData.status === 'success') {
                // 報到成功
                document.querySelector('.container').innerHTML = `
                    <h2 style="color: #28a745;">報到成功！</h2>
                    <p>歡迎光臨，${resData.user_name} 家長。</p>
                    <p>進館時間：${new Date().toLocaleTimeString()}</p>
                    <button onclick="location.reload()">回首頁</button>
                `;
            } else {
                alert("錯誤：" + resData.message);
            }
        };
    </script>
</body>
</html>
